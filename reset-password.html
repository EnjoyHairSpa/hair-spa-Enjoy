<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Hair Spa</title>
    <link rel="stylesheet" href="dark-luxury.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="gateway-container">
        <div class="modal-content" style="display: block; max-width: 400px; margin: auto; margin-top: 100px;">
            <h3 style="color: var(--gold); letter-spacing: 3px; font-weight: 200;">NUOVA PASSWORD</h3>
            <p style="font-size: 0.7rem; letter-spacing: 2px; color: #666; margin-bottom: 20px;">Scegli la tua nuova chiave d'accesso</p>
            
            <div class="auth-form-group">
                <input type="password" id="newPassword" placeholder="Nuova Password" class="auth-input">
                <button id="btnUpdatePassword" class="elegant-btn" style="width: 100%; margin-top: 10px;">Aggiorna Password</button>
            </div>
            <p id="resetMessage" class="auth-message"></p>
        </div>
    </div>

    <script>
        // Incolla qui le tue chiavi Supabase (le stesse di script.js)
        const SUPABASE_URL = 'https://ashctxmmjrjgmakuzpjy.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_eSsDyQAkrJZ_kiKnY27Idw_Fn6uQt2t';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const btnUpdate = document.getElementById('btnUpdatePassword');
        const message = document.getElementById('resetMessage');

        btnUpdate.onclick = async () => {
            const newPassword = document.getElementById('newPassword').value;

            if (newPassword.length < 6) {
                message.innerText = "La password deve avere almeno 6 caratteri.";
                return;
            }

            const { error } = await _supabase.auth.updateUser({ password: newPassword });

            if (error) {
                message.innerText = "Errore: " + error.message;
            } else {
                message.style.color = "gold";
                message.innerText = "Password aggiornata con successo! Tra 3 secondi tornerai al sito.";
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 3000);
            }
        };
    </script>
</body>
</html>
