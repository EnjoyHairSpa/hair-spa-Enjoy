<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenotazione - Hair Spa</title>
    <link rel="stylesheet" href="dark-luxury.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Accordion & Selection Style */
        .accordion-item { border: none !important; background: rgba(255,255,255,0.02); border-radius: 10px; margin-bottom: 12px !important; overflow: hidden; }
        .cat-title { padding: 18px !important; transition: background 0.3s; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .cat-title:hover { background: rgba(212, 175, 55, 0.05); }
        
        .radio-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer; transition: 0.3s;
        }
        .radio-item:hover { background: rgba(212, 175, 55, 0.03); }
        
        /* Custom Radio Style */
        .radio-item input[type="radio"] {
            appearance: none; width: 22px; height: 22px;
            border: 1px solid var(--gold); border-radius: 50%;
            outline: none; cursor: pointer; position: relative;
        }
        .radio-item input[type="radio"]:checked { background: var(--gold); border-color: var(--gold); }
        .radio-item input[type="radio"]:checked::after {
            content: '✓'; color: black; font-size: 14px; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold;
        }

        .consulenza-box { 
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 1px solid var(--gold); padding: 20px; border-radius: 15px;
            margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center;
        }
        .arrow { transition: transform 0.3s; color: var(--gold); }

        /* NUOVO STILE NOTE LUXURY (Uniformato a Percorsi) */
        .textarea-luxury {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #333;
            border-radius: 12px;
            color: #eee;
            padding: 15px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            transition: all 0.4s ease;
            margin-top: 8px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        .textarea-luxury:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }
        .textarea-luxury::placeholder {
            color: #555;
            font-style: italic;
        }

        .input-luxury {
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            margin-top: 5px;
            box-sizing: border-box;
        }
        .input-luxury:focus { border-color: var(--gold); outline: none; }
    </style>
</head>
<body class="dark-page">
    
    <div class="form-container">
        <a href="index.html" class="back-link" style="text-decoration: none; font-size: 0.7rem; color: var(--text-secondary); letter-spacing: 1px;">← TORNA ALLA HOME</a>
        
        <h1 class="page-title" style="margin-top: 20px; margin-bottom: 10px; font-weight: 200; letter-spacing: 6px;">PRENOTAZIONE</h1>
        
        <p id="welcome-user" style="text-align: center; color: var(--gold); font-style: italic; margin-bottom: 25px; font-size: 0.9rem;"></p>

        <form id="prenotazioneForm">
            
            <div class="consulenza-box">
                <div>
                    <strong style="color: var(--gold); display: block; font-size: 0.9rem; letter-spacing: 1px;">Consulenza Sensoriale</strong>
                    <small style="color: #777;">Analisi cute e capelli (Consigliata)</small>
                </div>
                <input type="checkbox" id="consulenza" name="consulenza" style="width: 22px; height: 22px; accent-color: var(--gold); cursor: pointer;">
            </div>

            <p class="section-label" style="font-size: 0.7rem; letter-spacing: 2px;">SELEZIONA I SERVIZI (Uno per categoria)</p>
            
            <div id="servizi-dinamici">
                <p style="color: white; opacity: 0.5; text-align: center; font-size: 0.8rem;">Componendo il tuo rituale...</p>
            </div>

            <p class="section-label" style="margin-top: 35px; font-size: 0.7rem; letter-spacing: 2px;">DATA E ORA</p>
            <div class="input-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label style="color: #666; font-size: 0.6rem; text-transform: uppercase;">Giorno</label>
                    <input type="date" id="data" name="data" class="input-luxury" required>
                </div>
                <div>
                    <label style="color: #666; font-size: 0.6rem; text-transform: uppercase;">Orario</label>
                    <input type="time" id="orario" name="orario" class="input-luxury" required>
                </div>
            </div>

            <div class="note-container" style="margin-top: 30px;">
                <label style="color: #666; font-size: 0.7rem; text-transform: uppercase; margin-left: 5px; letter-spacing: 1px;">Note e Desideri Particolari</label>
                <textarea id="note" name="note" class="textarea-luxury" 
                          placeholder="Raccontaci come possiamo rendere la tua esperienza indimenticabile..." rows="4"></textarea>
            </div>
            
            <button type="submit" id="btnPrenota" class="main-btn" style="margin-top: 30px; padding: 18px; letter-spacing: 3px;">CONFERMA PRENOTAZIONE</button>
            <p id="bookingMessage" class="auth-message" style="text-align: center; margin-top: 20px; font-size: 0.8rem;"></p>
        </form>
    </div>

    <script src="prenotazione.js"></script>
</body>
</html>
