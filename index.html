<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hair Spa - Benvenuto</title>
    <link rel="stylesheet" href="dark-luxury.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    
    <div class="top-nav">
        <button id="viewSettings" class="view-settings">Display: Relaxed</button>
        <button id="openAuth" class="auth-trigger-btn">Area Riservata</button>
    </div>

    <div class="gateway-container">
        <div class="card" style="background-image: url('Singola.png');">
            <div class="overlay">
                <h2>Seduta di Benessere</h2>
                <p>Il tuo momento dedicato, su misura.</p>
                <a href="Prenotazione.html" class="main-btn">Prenota Rituale</a>
            </div>
        </div>

        <div class="card" style="background-image: url('percorso.png');">
            <div class="overlay">
                <h2>Percorso Sensoriale</h2>
                <p>Un programma continuo per la bellezza dei tuoi capelli.</p>
                <a href="percorsi.html" class="main-btn">Componi il Percorso</a>
            </div>
        </div>
    </div>

    <div id="authModal" class="modal-overlay" style="display: none;">
        <div class="modal-content"> <span id="closeAuth" class="close-btn">&times;</span>
            
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Benvenuta</h3>
                <p class="modal-subtitle">In Enjoy</p>
            </div>
            
            <div class="auth-form-group">
                <div id="registerFields" style="display: none; width: 100%;">
                    <input type="text" id="authNome" placeholder="Nome" class="auth-input">
                    <input type="text" id="authCognome" placeholder="Cognome" class="auth-input">
                    <input type="tel" id="authTelefono" placeholder="Telefono" class="auth-input">
                </div>

                <input type="email" id="authEmail" placeholder="Email" class="auth-input">
                <input type="password" id="authPassword" placeholder="Password" class="auth-input">
                
                <button id="mainAuthBtn" class="main-btn">Accedi</button>
                <button id="toggleAuthMode" class="secondary-btn">Non hai un account? Registrati</button>
            </div>
            
            <p id="authMessage" class="auth-message"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
