<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hair Spa - Luxury Experience</title>
    <link rel="stylesheet" href="dark-luxury.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    
    <div class="top-nav">
        <button id="viewSettings" class="view-settings">Display: Relaxed</button>
        <button id="openAuth" class="auth-trigger-btn">Area Riservata</button>
    </div>

    <div class="gateway-container">
        
        <div class="luxury-card" style="background-image: url('Singola.png');">
            <div class="card-overlay">
                <div class="card-content">
                    <span class="card-subtitle">Esperienza Unica</span>
                    <h2 class="card-title">Seduta di Benessere</h2>
                    <p class="card-text">Il tuo momento dedicato, su misura.</p>
                    <a href="prenotazione.html" class="elegant-btn">Prenota Rituale</a>
                </div>
            </div>
        </div>

        <div class="luxury-card" style="background-image: url('percorso.png');">
            <div class="card-overlay">
                <div class="card-content">
                    <span class="card-subtitle">Continuità e Cura</span>
                    <h2 class="card-title">Percorso Sensoriale</h2>
                    <p class="card-text">Un programma continuo per la bellezza dei tuoi capelli.</p>
                    <a href="percorsi.html" class="elegant-btn">Componi il Percorso</a>
                </div>
            </div>
        </div>

    </div>

<div id="authModal" class="modal-overlay">
    <div class="modal-content">
        <span id="closeAuth" class="close-btn">&times;</span>
        
        <div id="loginSection">
            <h3 style="color: var(--gold); letter-spacing: 3px; font-weight: 200;">BENVENUTA</h3>
            <p style="font-size: 0.8rem; letter-spacing: 2px; color: #666; margin-bottom: 20px;">IN ENJOY</p>
            
            <div class="auth-form-group">
                <input type="email" id="authEmail" placeholder="Email" class="auth-input">
                <input type="password" id="authPassword" placeholder="Password" class="auth-input">
                
                <button id="btnLogin" class="elegant-btn" style="width: 100%; margin-top: 10px;">Accedi</button>
                <div style="text-align: center; margin-top: 15px;">
    <button type="button" id="btnResetPassword" style="background:none; border:none; color:#777; cursor:pointer; font-size:0.65rem; text-transform:uppercase; text-decoration:underline; letter-spacing:1px;">Password dimenticata?</button>
</div>
                <button type="button" onclick="toggleAuth(true)" class="secondary-btn" style="background:none; border:none; color:#555; cursor:pointer; font-size:0.7rem; margin-top:15px; text-transform:uppercase;">Non hai un account? Registrati</button>
            </div>
            
        </div>

        <div id="registerSection" style="display: none;">
            <h3 style="color: var(--gold); letter-spacing: 3px; font-weight: 200;">IL TUO PROFILO</h3>
            <p style="font-size: 0.7rem; letter-spacing: 2px; color: #666; margin-bottom: 20px;">UNISCITI ALL'ESPERIENZA</p>
            
            <div class="auth-form-group">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="text" id="regName" placeholder="Nome *" class="auth-input" style="margin-bottom:0;">
                    <input type="text" id="regSurname" placeholder="Cognome *" class="auth-input" style="margin-bottom:0;">
                </div>
                
                <input type="tel" id="regPhone" placeholder="Telefono *" class="auth-input">
                <input type="email" id="regEmail" placeholder="Email *" class="auth-input">
                <input type="password" id="regPassword" placeholder="Scegli Password *" class="auth-input">
                
                <div style="text-align: left; margin-bottom: 10px;">
                    <label style="font-size: 0.6rem; color: #555; text-transform: uppercase;">Data di Nascita (Opzionale)</label>
                    <input type="date" id="regBirth" class="auth-input" style="margin-top: 5px;">
                </div>

                <div style="display: flex; align-items: flex-start; gap: 10px; margin: 15px 0; text-align: left;">
                    <input type="checkbox" id="privacyCheck" style="margin-top: 3px;">
                    <label for="privacyCheck" style="font-size: 0.6rem; color: #666; line-height: 1.2;">
                        Accetto il trattamento dei dati personali ai fini della prenotazione e dei servizi Hair Spa. *
                    </label>
                </div>

                <button id="btnDoRegister" class="elegant-btn" style="width: 100%;">Crea Account</button>
                <button type="button" onclick="toggleAuth(false)" class="secondary-btn" style="background:none; border:none; color:#555; cursor:pointer; font-size:0.7rem; margin-top:15px; text-transform:uppercase;">Hai già un account? Accedi</button>
            </div>
        </div>
        
        <p id="authMessage" class="auth-message"></p>
    </div>
</div>



    <script src="script.js"></script>

    <script>
        // Controllo immediato al caricamento della home
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { user } } = await supabase.auth.getUser();
            const btnArea = document.getElementById('openAuth');

            if (user) {
                // Se l'utente è loggato, trasformiamo il bottone
                btnArea.innerText = "IL MIO DIARIO DI BELLEZZA";
                
                // Rimuoviamo l'apertura della modal e mettiamo il link diretto
                btnArea.onclick = function() {
                    window.location.href = 'area-riservata.html';
                };
            }
        });
    </script>

</body>
</html>
